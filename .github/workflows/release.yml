name: Build and Release Plugin

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g., ai-models-provider-v0.2.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.parse_tag.outputs.tag_name }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Parse plugin info from release tag
      id: parse_tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG_NAME="${{ inputs.tag_name }}"
        else
          TAG_NAME="${{ github.event.release.tag_name }}"
        fi

        if [ -z "$TAG_NAME" ]; then
          echo "Error: tag_name is empty"
          exit 1
        fi

        echo "Processing release tag: $TAG_NAME"
        
        # 解析插件名称和版本 (格式: plugin-name-vX.Y.Z 或 plugin-name-vX.Y.Z-beta.N)
        # 使用贪婪匹配提取插件名称（去掉 -vX.Y.Z... 部分）
        PLUGIN_NAME=$(echo "$TAG_NAME" | sed -E 's/-v[0-9]+\.[0-9]+\.[0-9]+.*//')
        # 提取完整版本号（包括预发布标识符）
        VERSION=$(echo "$TAG_NAME" | sed -E 's/^.*-v//')
        
        echo "Plugin name: $PLUGIN_NAME"
        echo "Version: $VERSION"
        
        echo "plugin_name=$PLUGIN_NAME" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        
        # 验证插件名称
        if [ "$PLUGIN_NAME" != "ai-models-provider" ] && [ "$PLUGIN_NAME" != "storage-tools" ]; then
          echo "Error: Unknown plugin name: $PLUGIN_NAME"
          exit 1
        fi
      
    - name: Install yq for YAML processing
      run: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.40.5/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
        
    - name: Download Dify Plugin CLI
      run: |
        mkdir -p /tmp/dify-cli
        curl -L -o /tmp/dify-cli/dify-plugin-linux-amd64 https://github.com/langgenius/dify-plugin-daemon/releases/download/0.2.0/dify-plugin-linux-amd64
        chmod +x /tmp/dify-cli/dify-plugin-linux-amd64
        
    - name: Prepare plugin files
      run: |
        mkdir -p /tmp/plugin-build
        # 复制插件目录到构建目录
        cp -r ${{ steps.parse_tag.outputs.plugin_name }}/* /tmp/plugin-build/

    - name: Clean build directory
      run: |
        cd /tmp/plugin-build
        
        # 清理 __pycache__ 文件
        find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
        find . -name "*.pyc" -delete 2>/dev/null || true
        
        echo "📦 Plugin files:"
        ls -la

    - name: Verify version matches tag
      run: |
        MANIFEST_VERSION=$(yq eval '.version' /tmp/plugin-build/manifest.yaml)
        TAG_VERSION="${{ steps.parse_tag.outputs.version }}"
        
        echo "Manifest version: $MANIFEST_VERSION"
        echo "Tag version: $TAG_VERSION"
        
        if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
          echo "Error: Version mismatch!"
          echo "  manifest.yaml version: $MANIFEST_VERSION"
          echo "  Release tag version: $TAG_VERSION"
          exit 1
        fi

    - name: Package plugin
      run: |
        PACKAGE_NAME="${{ steps.parse_tag.outputs.plugin_name }}-${{ steps.parse_tag.outputs.version }}.difypkg"
        echo "Building package: $PACKAGE_NAME"
        /tmp/dify-cli/dify-plugin-linux-amd64 plugin package -o "$PACKAGE_NAME" /tmp/plugin-build

    - name: Ensure release exists
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG_NAME="${{ steps.parse_tag.outputs.tag_name }}"
        if gh release view "$TAG_NAME" --repo "${{ github.repository }}" >/dev/null 2>&1; then
          echo "Release exists: $TAG_NAME"
        else
          echo "Release not found, creating: $TAG_NAME"
          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.parse_tag.outputs.plugin_name }} v${{ steps.parse_tag.outputs.version }}" \
            --notes "Auto-created by release workflow."
        fi
        
    - name: Upload package to release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PACKAGE_NAME="${{ steps.parse_tag.outputs.plugin_name }}-${{ steps.parse_tag.outputs.version }}.difypkg"
        gh release upload ${{ steps.parse_tag.outputs.tag_name }} "$PACKAGE_NAME" --clobber

  publish:
    needs: build
    uses: ./.github/workflows/publish.yml
    with:
      tag_name: ${{ needs.build.outputs.tag_name }}
    secrets: inherit
